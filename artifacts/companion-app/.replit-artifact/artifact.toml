kind = "web"
previewPath = "/"
title = "AI Companion Platform"
version = "1.0.0"
id = "artifacts/companion-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20041

[services.development]
run = "pnpm --filter @workspace/companion-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/companion-app", "run", "build" ]
publicDir = "artifacts/companion-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20041"
BASE_PATH = "/"
